services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kfh-app:latest
    depends_on:
      - db
    environment:
      APP_NAME: "KFH App"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:-}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kfh_app}
      DB_USERNAME: ${DB_USERNAME:-kfh}
      DB_PASSWORD: ${DB_PASSWORD:-kfh_password}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      # Set to "true" only when you want to auto-run migrations on boot.
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "8080:8080"
    volumes:
      - storage:/var/www/html/storage

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kfh_app}
      MYSQL_USER: ${DB_USERNAME:-kfh}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kfh_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - db:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  db:
  storage:
